name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: webapp backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      # The full dependency set (torch, pyserini, faiss) is multi-GB and not
      # needed by the webapp test suite, which fakes simple_evaluate. Install
      # the package without deps plus the light subset the tests import.
      - name: Install lrage (light) + web extra + test deps
        run: |
          pip install --no-deps -e .
          pip install \
            numpy pyyaml jinja2 tqdm datasets evaluate huggingface_hub \
            transformers sqlitedict dill sacrebleu scikit-learn rouge-score \
            jsonlines more_itertools pytablewriter word2number numexpr \
            zstandard accelerate \
            "fastapi>=0.104,<0.116" "pydantic>=2.5,<2.11" \
            "uvicorn[standard]>=0.23,<0.34" "sse-starlette>=1.6,<2.2" \
            pytest httpx
      - name: Run webapp tests
        run: pytest tests/webapp -q

  frontend:
    name: web UI tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npm run build
